name: Build CI

on:
  push:
    branches:
      - main
    paths:
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'include/**'
      - 'src/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
        fail-fast: false

        matrix:
            include:
            # --- Linux x64 ---
            - os: ubuntu-latest
              build_type: Debug
              compiler: { c: gcc, cpp: g++ }

            - os: ubuntu-latest
              build_type: Debug
              compiler: { c: clang, cpp: clang++ }

            # --- Linux ARM ---
            - os: ubuntu-24.04-arm
              build_type: Debug
              compiler: { c: gcc, cpp: g++ }

            - os: ubuntu-24.04-arm
              build_type: Debug
              compiler: { c: clang, cpp: clang++ }
        
    steps:
      # -----------------------------
      # Checkout repository
      # -----------------------------
      - name: Checkout code
        uses: actions/checkout@v6

    
      # -----------------------------
      # Install dependencies
      # -----------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            cmake \
            build-essential \
            libboost-test-dev

      # -----------------------------
      # Configure
      # -----------------------------
      - name: Configure CMake
        run: >
          cmake -S ${{ github.workspace }} -B build -G Ninja
          -DCMAKE_C_COMPILER=${{ matrix.compiler.c }}
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cpp }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_CXX_STANDARD=17
          -DCMAKE_CXX_STANDARD_REQUIRED=ON
          -DCMAKE_CXX_EXTENSIONS=OFF
          -DBUILD_EXAMPLE=ON
          -DBUILD_UNIT_TESTS=ON
          -DBUILD_INTEGRATION_TESTS = OFF

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build project
        run: |
          cmake --build build --config ${{ matrix.build_type }}

      # -----------------------------
      # Run tests
      # -----------------------------
      - name: Run tests
        run: |
          ctest --test-dir build --output-on-failure